<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign in</title>
    <link rel="stylesheet" href="aseats/styles/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo">
          <a href="index.html"> Your Logo </a>
        </div>
      </div>
    </header>
    <main>
      <section>
        <div class="container">
          <div class="form">
            <h1>Sign in</h1>
            <p class="have-an-account">
              If you don’t have an account registerYou can
              <a href="signup.html"> Register here !</a>
            </p>
            <form method="post">
              <label for="email">Email</label>
              <div class="input-container">
                <img
                  src="aseats/icons/message (1).webp"class="icon" alt="Email Icon"/>
                <input
                  type="email" id="email" name="email"
                  placeholder="Enter your email address"
                />
              </div>
              <label for="password">Password</label>
              <div class="input-container">
                <img
                  src="aseats/icons/padlock.webp"class="icon"alt="Email Icon"/>
                <input
                  type="password" id="password"name="password"
                  placeholder="Enter your password"/>
              </div>
             
            </form>
          </div>
        </div>
      </section>
          
    </main>
  </body>
</html>
